<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VendorBridge | Enterprise Login</title>

        tailwind.config = {

                        "inverse-surface": "#213145",
                        "background": "#f8f9ff",
                        "secondary-container": "#dae2fd",
                        "surface": "#f8f9ff",
                        "primary": "#004ac6",
                        "on-primary": "#ffffff",
                        "secondary-fixed": "#dae2fd",
                        "surface-container-low": "#eff4ff",
                        "on-primary-fixed": "#00174b",
                        "inverse-on-surface": "#eaf1ff",
                        "tertiary-fixed": "#6bff8f",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-highest": "#d3e4fe",
                        "surface-bright": "#f8f9ff",
                        "secondary": "#565e74",
                        "surface-variant": "#d3e4fe",
                        "primary-fixed": "#dbe1ff",
                        "on-surface-variant": "#434655",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#4ae176",
                        "surface-container-high": "#dce9ff",
                        "on-primary-container": "#eeefff",
                        "tertiary": "#006229",
                        "on-tertiary-fixed-variant": "#005321",
                        "on-secondary-fixed": "#131b2e",
                        "outline": "#737686",
                        "on-primary-fixed-variant": "#003ea8",
                        "error-container": "#ffdad6",
                        "surface-tint": "#0053db",
                        "secondary-fixed-dim": "#bec6e0",
                        "surface-container-lowest": "#ffffff",
                        "primary-container": "#2563eb",
                        "on-error": "#ffffff",
                        "outline-variant": "#c3c6d7",
                        "on-background": "#0b1c30",
                        "on-tertiary": "#ffffff",
                        "surface-dim": "#cbdbf5",
                        "inverse-primary": "#b4c5ff",
                        "surface-container": "#e5eeff",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#002109",
                        "on-secondary-container": "#5c647a",
                        "on-surface": "#0b1c30",

                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#3f465c"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8FAFC;
        }
        .enterprise-shadow {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<main class="w-full max-w-[440px]">
    <div class="bg-white border border-outline-variant rounded-xl enterprise-shadow overflow-hidden">
        <div class="pt-8 pb-6 px-8 flex flex-col items-center">
            <div class="w-20 h-20 rounded-full bg-blue-50 flex items-center justify-center mb-4 border border-primary/10 overflow-hidden">
                <div class="w-12 h-12 rounded-sm bg-gradient-to-tr from-blue-700 to-indigo-500 transform rotate-45 flex items-center justify-center">
                    <span class="material-symbols-outlined text-white transform -rotate-45 font-bold">handshake</span>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-on-surface mb-1">VendorBridge</h1>
            <p class="text-sm text-on-surface-variant text-center">Enterprise Procurement Portal</p>
        </div>

        <form id="loginForm" class="px-8 pb-8 space-y-5">
            <div class="space-y-1">
                <label class="text-xs font-semibold text-on-surface-variant ml-1" for="username">Username or Email</label>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]">person</span>
                    <input class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-outline-variant bg-white text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="username" name="username" placeholder="Enter your username" type="text" required/>
                </div>
            </div>
            <div class="space-y-1">
                <div class="flex justify-between items-center">
                    <label class="text-xs font-semibold text-on-surface-variant ml-1" for="password">Password</label>
                    <a class="text-xs font-medium text-primary hover:underline transition-all" href="#">Forgot password?</a>
                </div>
                <div class="relative group">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors text-[20px]">lock</span>
                    <input class="w-full pl-10 pr-4 py-2.5 rounded-lg border border-outline-variant bg-white text-sm text-on-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password" required/>
                </div>
            </div>
            <div class="flex items-center space-x-2 pt-1">
                <input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary" id="remember" name="remember" type="checkbox"/>
                <label class="text-sm text-on-surface-variant select-none" for="remember">Keep me signed in</label>
            </div>
            <button id="submitBtn" class="w-full py-2.5 bg-primary text-white font-semibold text-sm rounded-lg hover:bg-blue-700 active:scale-[0.99] transition-all flex items-center justify-center space-x-2" type="submit">
                <span>Login</span>
                <span class="material-symbols-outlined text-[18px]">login</span>
            </button>
        </form>

        <div class="px-8 pb-8">
            <div class="relative flex items-center py-2">
                <div class="flex-grow border-t border-outline-variant"></div>
                <span class="flex-shrink mx-3 text-xs font-medium text-outline">or continue with</span>
                <div class="flex-grow border-t border-outline-variant"></div>
            </div>
            <div class="grid grid-cols-2 gap-4 mt-3">
                <button class="flex items-center justify-center py-2 px-4 border border-outline-variant rounded-lg hover:bg-slate-50 transition-colors text-sm font-medium text-on-surface-variant">
                    <svg class="w-4 h-4 mr-2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    Google
                </button>
                <button class="flex items-center justify-center py-2 px-4 border border-outline-variant rounded-lg hover:bg-slate-50 transition-colors text-sm font-medium text-on-surface-variant">
                    <span class="material-symbols-outlined text-[20px] mr-2">corporate_fare</span>
                    SAML SSO
                </button>
            </div>
        </div>
    </div>
    <footer class="mt-8 flex flex-col items-center space-y-3">
        <div class="flex space-x-6">
            <a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Privacy Policy</a>
            <a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Terms of Service</a>
            <a class="text-xs text-on-surface-variant hover:text-primary transition-colors" href="#">Contact Support</a>
        </div>
        <p class="text-xs text-outline">&copy; 2026 VendorBridge Inc. All rights reserved.</p>
    </footer>
</main>

<script>
    const BACKEND_URL = "http://10.220.60.10:8000";

    document.addEventListener("DOMContentLoaded", () => {
        const loginForm = document.getElementById("loginForm");
        const loginBtn = document.getElementById("submitBtn");

    
        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault(); 

            const originalContent = loginBtn.innerHTML;
            loginBtn.disabled = true;
            // Native smooth visual loading feedback loop
            loginBtn.innerHTML = '<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

            const usernameField = document.getElementById("username");
            const passwordField = document.getElementById("password");

            const payload = {
                email: usernameField.value,
                password: passwordField.value
            };

            try {
                const response = await fetch(`${BACKEND_URL}/auth/login`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    console.log("Token Data:", data);
                    
                    if (data.access_token) {
                        localStorage.setItem("token", data.access_token);
                        localStorage.setItem("role", data.role);
                    }
                    
                    // CORRECTED ROUTING TO LANDING PAGE FILE
                    window.location.href = "main_landing_page.html";
                } else {
                    alert(`Login Failed: ${data.detail || "Invalid credentials"}`);
                }
            } catch (error) {
                console.error("Network Error:", error);
                alert("Cannot connect to the backend server. Make sure it is running on the other PC and CORS is enabled!");
            } finally {
                loginBtn.innerHTML = originalContent;
                loginBtn.disabled = false;
            }
        });
    });
</script>
</body>
</html>
